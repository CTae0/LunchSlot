<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>점메추 🍱</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --orange:      #FF5722;
  --orange-dark: #D84315;
  --orange-pale: #FFF3EE;
  --orange-mid:  #FFCCBC;
  --white:       #FFFFFF;
  --gray-100:    #F5F5F5;
  --gray-200:    #E8E8E8;
  --gray-400:    #BDBDBD;
  --gray-600:    #757575;
  --gray-800:    #424242;
  --text:        #1A1A1A;
  --r-sm: 10px; --r-md: 14px; --r-lg: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #FAFAFA;
  display: flex;
  justify-content: center;
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}
#app {
  width: 100%; max-width: 430px;
  min-height: 100vh; min-height: 100dvh;
  background: var(--white);
  display: flex; flex-direction: column;
  box-shadow: 0 0 40px rgba(0,0,0,.08);
  overflow: hidden;
}
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ── TOP BAR ── */
.top-bar {
  background: var(--orange);
  height: 56px; padding: 0 20px;
  display: flex; align-items: center; justify-content: center;
  position: relative; flex-shrink: 0;
}
.top-bar-title { font-family: 'Jua', sans-serif; font-size: 18px; color: #fff; letter-spacing: 1px; }
.back-btn {
  position: absolute; left: 12px;
  width: 36px; height: 36px;
  background: rgba(255,255,255,.18); border: none; border-radius: 9px;
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.back-btn:hover { background: rgba(255,255,255,.28); }

/* ══════════════════════
   SCREEN 1: LANDING
══════════════════════ */
#screen-landing { background: var(--orange); justify-content: space-between; }
.landing-hero {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 48px 32px 32px; gap: 14px;
}
.hero-icon {
  font-size: 80px; line-height: 1;
  animation: float 3.5s ease-in-out infinite;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,.2));
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50%     { transform: translateY(-14px) rotate(3deg); }
}
.hero-title {
  font-family: 'Jua', sans-serif; font-size: 56px;
  color: #fff; letter-spacing: -2px;
  text-shadow: 0 4px 12px rgba(0,0,0,.2);
}
.hero-badge {
  background: rgba(255,255,255,.2); color: #fff;
  font-size: 13px; font-weight: 700;
  padding: 6px 18px; border-radius: 100px;
}
.landing-cta {
  background: var(--white); border-radius: 28px 28px 0 0;
  padding: 28px 24px 40px;
  display: flex; flex-direction: column; gap: 12px;
  box-shadow: 0 -4px 24px rgba(0,0,0,.08);
}
.landing-cta-hint { font-size: 13px; color: var(--gray-600); font-weight: 500; text-align: center; }
.btn-cta {
  background: var(--orange); color: #fff;
  font-family: 'Jua', sans-serif; font-size: 20px; letter-spacing: 1.5px;
  border: none; border-radius: var(--r-md); padding: 18px;
  width: 100%; cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,87,34,.4);
  transition: background .15s, transform .1s;
}
.btn-cta:hover  { background: var(--orange-dark); transform: translateY(-1px); }
.btn-cta:active { transform: translateY(1px); }
.btn-ghost {
  background: none; border: 1.5px solid var(--gray-200);
  color: var(--gray-600); font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 700;
  border-radius: var(--r-md); padding: 14px;
  width: 100%; cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-ghost:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-pale); }

/* ══════════════════════
   SCREEN 2: FILTER
══════════════════════ */
#screen-filter { background: var(--white); }
.filter-scroll {
  flex: 1; overflow-y: auto;
  padding: 20px 20px 0;
  display: flex; flex-direction: column; gap: 20px;
}
.section-label { font-size: 11px; font-weight: 700; color: var(--gray-400); letter-spacing: 2px; text-transform: uppercase; }
.section-title { font-size: 17px; font-weight: 700; color: var(--text); margin-top: 2px; }
.category-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.cat-btn {
  background: var(--white); border: 1.5px solid var(--gray-200);
  border-radius: var(--r-md); padding: 16px 8px 14px;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  transition: all .18s; position: relative; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.cat-btn .cat-emoji { font-size: 28px; line-height: 1; }
.cat-btn .cat-name  { font-size: 13px; font-weight: 700; color: var(--text); }
.cat-btn:hover { border-color: var(--orange); background: var(--orange-pale); }
.cat-btn.excluded { background: var(--gray-100); border-color: var(--gray-200); opacity: .5; }
.cat-btn.excluded .cat-name  { color: var(--gray-600); text-decoration: line-through; }
.cat-btn.excluded .cat-emoji { filter: grayscale(1); }
.cat-btn.excluded::after {
  content: '✕'; position: absolute; top: 6px; right: 8px;
  font-size: 11px; font-weight: 900; color: var(--gray-400);
}
.tag-area {
  background: var(--orange-pale); border: 1.5px solid var(--orange-mid);
  border-radius: var(--r-md); padding: 14px 16px;
  display: flex; flex-wrap: wrap; gap: 6px;
  min-height: 52px; align-items: center;
}
.active-tag {
  background: var(--orange); color: #fff;
  font-size: 12px; font-weight: 700;
  padding: 4px 12px; border-radius: 100px;
}
.tag-empty { font-size: 13px; color: var(--orange); font-weight: 700; }
.filter-footer {
  padding: 16px 20px 32px; background: var(--white);
  border-top: 1px solid var(--gray-100); flex-shrink: 0;
}
.btn-spin {
  background: var(--orange); color: #fff;
  font-family: 'Jua', sans-serif; font-size: 19px; letter-spacing: 1.5px;
  border: none; border-radius: var(--r-md); padding: 18px;
  width: 100%; cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,87,34,.4);
  transition: background .15s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-spin:hover  { background: var(--orange-dark); transform: translateY(-1px); }
.btn-spin:active { transform: translateY(1px); }
.btn-spin:disabled { background: var(--gray-400); box-shadow: none; cursor: not-allowed; transform: none; }

/* ══════════════════════
   SCREEN 3: SLOT
══════════════════════ */
#screen-slot { background: var(--white); }
.slot-scroll {
  flex: 1; overflow-y: auto;
  padding: 20px 20px 32px;
  display: flex; flex-direction: column;
  align-items: center; gap: 16px;
}

/* 슬롯 머신 카드 */
.slot-machine {
  width: 100%; background: var(--gray-100);
  border-radius: var(--r-lg); padding: 18px 16px 16px;
  border: 2px solid var(--gray-200);
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  position: relative; overflow: hidden;
}
.slot-machine::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--orange), #FF8A65, var(--orange));
}
.slot-dots { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r{background:#FF5F57;} .dot-y{background:#FFBD2E;} .dot-g{background:#28CA41;}
.slot-dots-label { margin-left: 8px; font-size: 10px; font-weight: 700; color: var(--gray-400); letter-spacing: 3px; }

/* ── 릴 컨테이너 ── */
.reels-wrap { display: flex; gap: 10px; }

/*
  핵심 구조:
  - .reel-window: overflow:hidden 창 (높이 = ITEM_H * 3 = 240px, 가운데 1칸이 선택)
  - .reel-strip:  실제 아이템 리스트, translateY로 스크롤
  - 중앙 = window 높이/2 - ITEM_H/2 = 120 - 40 = 80px 오프셋
*/
.reel-window {
  flex: 1; height: 240px;
  overflow: hidden; position: relative;
  border-radius: 12px;
  background: var(--white);
  border: 2px solid var(--gray-200);
}
/* 중앙 하이라이트 (80px~160px = 가운데 80px 구간) */
.reel-window::before {
  content: ''; position: absolute;
  top: 80px; left: 0; right: 0; height: 80px;
  background: var(--orange-pale);
  border-top: 2px solid var(--orange-mid);
  border-bottom: 2px solid var(--orange-mid);
  z-index: 1; pointer-events: none;
}
/* 위아래 페이드 — 양 끝 10%만 */
.reel-window::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,1)    0%,
    rgba(255,255,255,0)   22%,
    rgba(255,255,255,0)   78%,
    rgba(255,255,255,1)  100%
  );
  z-index: 3; pointer-events: none;
}
.reel-strip {
  position: absolute; left: 0; right: 0; top: 0;
  display: flex; flex-direction: column;
  will-change: transform;
  z-index: 2; /* 하이라이트(1) 위, 페이드(3) 아래 */
}
.reel-item {
  height: 80px; flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
}
.r-emoji { font-size: 28px; line-height: 1; }
.r-name  {
  font-size: 12px; font-weight: 700; color: var(--gray-800);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 90%; text-align: center;
}
.reel-sep { width: 2px; background: var(--gray-200); border-radius: 2px; align-self: stretch; }

/* SPIN 버튼 */
.lever-area { display: flex; justify-content: center; margin-top: 14px; }
.lever-btn {
  background: var(--orange); border: none; border-radius: 12px;
  padding: 13px 48px; color: #fff;
  font-family: 'Jua', sans-serif; font-size: 17px; letter-spacing: 2px;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--orange-dark), 0 6px 20px rgba(255,87,34,.35);
  transition: background .15s, transform .1s, box-shadow .1s;
  display: flex; align-items: center; gap: 8px;
}
.lever-btn:hover:not(:disabled)  { background: var(--orange-dark); }
.lever-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 var(--orange-dark); }
.lever-btn:disabled { background: var(--gray-400); box-shadow: none; cursor: not-allowed; }

/* 결과 카드 */
.result-card {
  width: 100%; background: var(--orange-pale);
  border: 2px solid var(--orange-mid); border-radius: var(--r-lg);
  padding: 22px 20px;
  display: none; flex-direction: column; align-items: center; gap: 6px;
}
.result-card.visible { display: flex; animation: popUp .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes popUp { from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }
.result-eyebrow { font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
.result-food { font-family:'Jua',sans-serif; font-size: 36px; color: var(--text); letter-spacing:-1px; text-align:center; }
.result-cat  {
  font-size: 13px; color: var(--gray-600); font-weight: 500;
  background: var(--white); padding: 4px 14px; border-radius: 100px;
  border: 1.5px solid var(--orange-mid);
}

/* 액션 버튼 */
.action-area { width: 100%; display: none; flex-direction: column; gap: 8px; }
.action-area.visible { display: flex; }
.action-row { display: flex; gap: 8px; }
.btn-action {
  flex: 1; border: none; border-radius: var(--r-sm);
  padding: 14px 10px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-family: 'Noto Sans KR', sans-serif; white-space: nowrap;
}
.btn-again { background: var(--orange); color: #fff; box-shadow: 0 3px 12px rgba(255,87,34,.3); }
.btn-again:hover { background: var(--orange-dark); transform: translateY(-1px); }
.btn-share { background: var(--white); color: var(--text); border: 2px solid var(--gray-200); }
.btn-share:hover { border-color: var(--orange); color: var(--orange); transform: translateY(-1px); }
.btn-who-slot {
  width: 100%; background: var(--white); border: 2px solid var(--gray-200);
  color: var(--gray-600); font-size: 13px; font-weight: 700;
  padding: 13px; border-radius: var(--r-sm);
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn-who-slot:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-pale); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #1A1A1A; color: #fff;
  padding: 12px 24px; border-radius: 100px;
  font-size: 14px; font-weight: 700; white-space: nowrap;
  opacity: 0; transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .25s;
  z-index: 999; box-shadow: 0 6px 24px rgba(0,0,0,.3); pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── POPUP (bottom sheet) ── */
.popup-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.popup-overlay.show { display: flex; }
.popup-card {
  background: var(--white); border-radius: 24px 24px 0 0;
  padding: 8px 24px 44px; width: 100%; max-width: 430px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  animation: slideUp .35s cubic-bezier(.34,1.2,.64,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.popup-handle { width: 40px; height: 4px; background: var(--gray-200); border-radius: 2px; margin-bottom: 4px; }
.popup-emoji  { font-size: 48px; }
.popup-title  { font-family:'Jua',sans-serif; font-size: 20px; color: var(--text); text-align: center; line-height: 1.5; }
.popup-desc   { font-size: 14px; color: var(--gray-600); text-align: center; line-height: 1.8; }
.popup-desc b { color: var(--text); }
.popup-link-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--orange); color: #fff;
  font-family: 'Jua', sans-serif; font-size: 16px;
  text-decoration: none; padding: 16px; border-radius: var(--r-md);
  width: 100%; transition: background .15s;
  box-shadow: 0 4px 16px rgba(255,87,34,.35); margin-top: 4px;
}
.popup-link-btn:hover { background: var(--orange-dark); }
.popup-close {
  background: none; border: 1.5px solid var(--gray-200);
  color: var(--gray-600); font-size: 14px; font-weight: 700;
  padding: 13px; border-radius: var(--r-md);
  cursor: pointer; width: 100%; transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.popup-close:hover { border-color: var(--orange); color: var(--orange); }

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed; pointer-events: none; z-index: 50;
  border-radius: 2px; animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>
<div id="app">

<!-- ══ LANDING ══ -->
<div id="screen-landing" class="screen active">
  <div class="landing-hero">
    <div class="hero-icon">🍽️</div>
    <div class="hero-title">점메추</div>
    <div class="hero-badge">오늘 점심을 슬롯이 골라드릴게요!</div>
  </div>
  <div class="landing-cta">
    <p class="landing-cta-hint">🎰 슬롯을 돌려서 메뉴를 추천받아요</p>
    <button class="btn-cta" onclick="goTo('filter')">점메추 시작하기</button>
    <button class="btn-ghost" onclick="showWho()">👤 만든 사람은 누구?</button>
  </div>
</div>

<!-- ══ FILTER ══ -->
<div id="screen-filter" class="screen">
  <div class="top-bar">
    <button class="back-btn" id="back-filter" onclick="goTo('landing')">←</button>
    <span class="top-bar-title">카테고리 선택</span>
  </div>
  <div class="filter-scroll">
    <div>
      <div class="section-label">Step 1</div>
      <div class="section-title">제외할 카테고리를 눌러주세요</div>
    </div>
    <div class="category-grid" id="cat-grid"></div>
    <div>
      <div class="section-label" style="margin-bottom:8px">포함된 카테고리</div>
      <div class="tag-area" id="active-list"></div>
    </div>
    <div style="height:4px"></div>
  </div>
  <div class="filter-footer">
    <button class="btn-spin" id="btn-spin" onclick="startSpin()">🎰 슬롯 돌리기!</button>
  </div>
</div>

<!-- ══ SLOT ══ -->
<div id="screen-slot" class="screen">
  <div class="top-bar">
    <button class="back-btn" id="back-slot" onclick="goTo('filter')">←</button>
    <span class="top-bar-title">오늘의 점메추</span>
  </div>
  <div class="slot-scroll">

    <div class="slot-machine">
      <div class="slot-dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <span class="slot-dots-label">LUNCH SLOT</span>
      </div>
      <div class="reels-wrap" id="reels-wrap">
        <!-- JS로 생성 -->
      </div>
      <div class="lever-area">
        <button class="lever-btn" id="lever-btn" onclick="spinSlot()">🎰 SPIN</button>
      </div>
    </div>

    <div class="result-card" id="result-card">
      <div class="result-eyebrow">오늘의 점심 추천</div>
      <div class="result-food" id="result-food"></div>
      <div class="result-cat"  id="result-cat"></div>
    </div>

    <div class="action-area" id="action-area">
      <div class="action-row">
        <button class="btn-action btn-again" onclick="spinSlot()">🎲 다시 돌리기</button>
        <button class="btn-action btn-share" onclick="shareLink()">🔗 공유하기</button>
      </div>
      <button class="btn-who-slot" onclick="showWho()">👤 만든 사람은 누구?</button>
    </div>

  </div>
</div>

</div><!-- #app -->

<div class="toast" id="toast"></div>

<div class="popup-overlay" id="popup" onclick="handlePopupBg(event)">
  <div class="popup-card">
    <div class="popup-handle"></div>
    <div class="popup-emoji">🍊</div>
    <div class="popup-title">개혁신당 춘천시 라선거구<br>최태영 후보</div>
    <div class="popup-desc">
      춘천시 라선거구는 <b>3명을 뽑는</b> 기초의원 선거예요!<br>
      1등만 당선되는 게 아니라<br>
      <b>3등 안에만 들면 당선!</b> 🎉<br><br>
      소중한 한 표, 최태영 후보에게 주시면<br>충분히 당선될 수 있습니다 💪
    </div>
    <a class="popup-link-btn" href="https://litt.ly/taeyoung_choe" target="_blank" rel="noopener">
      🔗 최태영 후보 더 알아보기
    </a>
    <button class="popup-close" onclick="closePopup()">닫기</button>
  </div>
</div>

<script>
/* ══════════════════════
   DATA
══════════════════════ */
const CATEGORIES = [
  { id:'korean',   name:'한식',      emoji:'🍚', foods:[
    {name:'삼겹살',    emoji:'🥓'}, {name:'김치찌개',  emoji:'🍲'},
    {name:'비빔밥',    emoji:'🥗'}, {name:'된장찌개',  emoji:'🫕'},
    {name:'냉면',      emoji:'🍜'}, {name:'불고기',    emoji:'🥩'},
    {name:'순두부찌개',emoji:'🥣'}, {name:'제육볶음',  emoji:'🍖'},
    {name:'국밥',      emoji:'🍲'}, {name:'찜닭',      emoji:'🍗'},
    {name:'부대찌개',  emoji:'🫕'},
  ]},

/* ══════════════════════
   슬롯 상수
   ITEM_H  = .reel-item 의 height (px)
   WIN_H   = .reel-window 의 height (px)
   PRE     = winner 앞에 쌓는 랜덤 아이템 수
   
   translateY 공식:
     스트립 시작: translateY(0)  → 첫 아이템 상단이 윈도우 상단
     winner 중앙 정렬:
       winner 아이템 상단 y = winnerIdx * ITEM_H
       중앙 오프셋 = WIN_H/2 - ITEM_H/2
       → translateY = -(winnerIdx * ITEM_H) + (WIN_H/2 - ITEM_H/2)
══════════════════════ */
const ITEM_H = 80;   // CSS .reel-item height
const WIN_H  = 240;  // CSS .reel-window height
const PRE    = 25;   // 랜덤 아이템 수 (충분히 길게)
const REEL_N = 3;

let excluded = new Set();
let spinning  = false;
let winner    = null;

/* ══ Navigation ══ */
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('back-filter').style.display = id==='filter' ? 'flex' : 'none';
  document.getElementById('back-slot').style.display   = id==='slot'   ? 'flex' : 'none';
  if (id === 'filter') renderFilter();
  if (id === 'slot')   initSlot();
}

/* ══ Filter ══ */
function renderFilter() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (excluded.has(cat.id) ? ' excluded' : '');
    btn.innerHTML = `<div class="cat-emoji">${cat.emoji}</div><div class="cat-name">${cat.name}</div>`;
    btn.onclick = () => { excluded.has(cat.id) ? excluded.delete(cat.id) : excluded.add(cat.id); renderFilter(); };
    grid.appendChild(btn);
  });
  const active = CATEGORIES.filter(c => !excluded.has(c.id));
  document.getElementById('active-list').innerHTML = active.length
    ? active.map(c => `<span class="active-tag">${c.emoji} ${c.name}</span>`).join('')
    : '<span class="tag-empty">최소 1개는 포함해야 해요!</span>';
  document.getElementById('btn-spin').disabled = active.length === 0;
}

function startSpin() {
  if (CATEGORIES.filter(c => !excluded.has(c.id)).length === 0) return;
  goTo('slot');
}

function getActiveFoods() {
  return CATEGORIES.filter(c => !excluded.has(c.id))
    .flatMap(c => c.foods.map(f => ({...f, catId:c.id})));
}

/* ══ Slot Init ══ */
function buildStrip(foods) {
  // PRE개 랜덤 + winner 1개
  const items = [];
  for (let i = 0; i < PRE; i++) items.push(foods[Math.floor(Math.random() * foods.length)]);
  items.push(winner);
  return items;
}

function renderStrip(strip) {
  return strip.map(f =>
    `<div class="reel-item"><div class="r-emoji">${f.emoji}</div><div class="r-name">${f.name}</div></div>`
  ).join('');
}

function initSlot() {
  const wrap = document.getElementById('reels-wrap');
  wrap.innerHTML = '';
  for (let i = 0; i < REEL_N; i++) {
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'reel-sep'; wrap.appendChild(sep);
    }
    const win = document.createElement('div');
    win.className = 'reel-window'; win.id = 'rw-' + i;
    const strip = document.createElement('div');
    strip.className = 'reel-strip'; strip.id = 'rs-' + i;
    win.appendChild(strip);
    wrap.appendChild(win);
  }
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('action-area').classList.remove('visible');
  winner = null;
  spinSlot();
}

/* ══ Spin ══ */
function spinSlot() {
  if (spinning) return;
  const foods = getActiveFoods();
  if (!foods.length) return;

  spinning = true;
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('action-area').classList.remove('visible');
  document.getElementById('lever-btn').disabled = true;

  winner = foods[Math.floor(Math.random() * foods.length)];

  // 각 릴: 스트립 렌더 → 즉시 맨 위(0)로 → rAF×2 후 winner 위치로 이동
  const durs   = [1300, 1800, 2300]; // 릴별 애니메이션 시간
  const delays = [0,    180,  360 ]; // 릴별 시작 딜레이

  for (let i = 0; i < REEL_N; i++) {
    const strip  = document.getElementById('rs-' + i);
    const items  = buildStrip(foods);
    strip.innerHTML = renderStrip(items);

    // winner는 마지막 인덱스
    const winIdx = items.length - 1; // = PRE
    // winner 아이템 중앙 정렬:
    //   아이템 상단 위치 = winIdx * ITEM_H
    //   윈도우 중앙 오프셋 = WIN_H/2 - ITEM_H/2
    //   translateY = -(winIdx * ITEM_H) + (WIN_H/2 - ITEM_H/2)
    const target = -(winIdx * ITEM_H) + (WIN_H / 2 - ITEM_H / 2);

    // 즉시 초기화 (transition 없이)
    strip.style.transition = 'none';
    strip.style.transform  = 'translateY(0px)';

    // rAF 두 번 → 브라우저가 초기 상태를 완전히 페인트한 뒤 애니메이션
    ;(function(s, t, dur, del) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          setTimeout(() => {
            s.style.transition = `transform ${dur}ms cubic-bezier(0.23,1,0.32,1)`;
            s.style.transform  = `translateY(${t}px)`;
          }, del);
        });
      });
    })(strip, target, durs[i], delays[i]);
  }

  // 마지막 릴 완료 시점에 결과 표시
  const totalMs = delays[REEL_N-1] + durs[REEL_N-1] + 200;

  // 릴별 멈출 때 글로우
  durs.forEach((dur, i) => {
    setTimeout(() => {
      const rw = document.getElementById('rw-' + i);
      rw.style.boxShadow = '0 0 0 2.5px var(--orange), 0 0 16px rgba(255,87,34,.35)';
      setTimeout(() => { rw.style.boxShadow = ''; }, 600);
    }, delays[i] + dur + 50);
  });

  setTimeout(() => {
    spinning = false;
    document.getElementById('lever-btn').disabled = false;
    const cat = CATEGORIES.find(c => c.id === winner.catId);
    document.getElementById('result-food').textContent = `${winner.emoji} ${winner.name}`;
    document.getElementById('result-cat').textContent  = cat ? `${cat.emoji} ${cat.name}` : '';
    document.getElementById('result-card').classList.add('visible');
    document.getElementById('action-area').classList.add('visible');
    launchConfetti();
  }, totalMs);
}

/* ══ Confetti ══ */
function launchConfetti() {
  const colors = ['#FF5722','#FF8A65','#FFD166','#06D6A0','#64B5F6','#fff'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw; top:-10px;
      width:${5+Math.random()*6}px; height:${9+Math.random()*10}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.3+Math.random()*1.5}s;
      animation-delay:${Math.random()*0.4}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

/* ══ Share ══ */
function shareLink() {
  const url = location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('🔗 링크가 복사되었습니다!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('🔗 링크가 복사되었습니다!');
  }
}

/* ══ Toast ══ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

/* ══ Popup ══ */
function showWho()  { document.getElementById('popup').classList.add('show'); }
function closePopup(){ document.getElementById('popup').classList.remove('show'); }
function handlePopupBg(e){ if(e.target===document.getElementById('popup')) closePopup(); }

// 초기화
renderFilter();
</script>
